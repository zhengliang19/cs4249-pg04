<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Splitwise — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="logging.js"></script>
<style>
/* ── Reset & Variables ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f6f8f9;
  --card:      #ffffff;
  --border:    rgba(0,0,0,0.10);
  --muted:     #ececf0;
  --muted-fg:  #717182;
  --accent:    #e9ebef;
  --ink:       #030213;
  --teal:      #5bc5a7;
  --teal-dark: #48a085;
  --red:       #ff652f;
  --gray:      #999;
  --radius:    0.625rem;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.07);
  --shadow:    0 2px 12px rgba(0,0,0,.09);
}

html, body { height: 100%; font-family: 'Inter', sans-serif; font-size: 16px; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }

/* ── Layout ───────────────────────────────────────────── */
.app { display: flex; height: 100vh; overflow: hidden; }

.with-opt {
  padding: 9px 14px; font-size: .85rem; cursor: pointer;
  display: flex; align-items: center;
  transition: background .1s;
}
.with-opt:hover { background: var(--accent); }

/* ══════════════ LEFT SIDEBAR ══════════════ */
.left-sidebar {
  width: 280px; min-width: 280px;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}
.sidebar-logo {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--teal); display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { width: 18px; height: 18px; color: #fff; }
.logo-text { font-size: 1.1rem; font-weight: 700; color: var(--teal); letter-spacing: -0.3px; }

.sidebar-search { padding: 16px; flex-shrink: 0; }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted-fg); width: 15px; height: 15px; pointer-events: none; }
.search-input {
  width: 100%; padding: 9px 12px 9px 32px;
  border: none; border-radius: var(--radius);
  background: #f3f3f5; font-family: inherit; font-size: .85rem;
  color: var(--ink); outline: none; transition: box-shadow .15s;
}
.search-input:focus { box-shadow: 0 0 0 2px var(--teal); }
.search-input::placeholder { color: var(--muted-fg); }

.sidebar-add { margin: 0 16px 16px; flex-shrink: 0; }
.btn-teal {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  width: 100%; padding: 10px 16px;
  background: var(--teal); color: #fff; border: none;
  border-radius: var(--radius); font-family: inherit;
  font-size: .875rem; font-weight: 500; cursor: pointer;
  transition: background .15s, transform .1s;
}
.btn-teal:hover { background: var(--teal-dark); }
.btn-teal:active { transform: scale(.98); }
.btn-teal svg { width: 16px; height: 16px; }

.sidebar-tabs {
  display: flex; margin: 0 16px 0;
  background: var(--muted); border-radius: var(--radius);
  padding: 3px; flex-shrink: 0;
}
.tab-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 7px; border: none; background: none;
  border-radius: calc(var(--radius) - 2px);
  font-family: inherit; font-size: .8rem; font-weight: 500; color: var(--muted-fg);
  cursor: pointer; transition: all .15s;
}
.tab-btn.active { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }
.tab-btn svg { width: 14px; height: 14px; }

.sidebar-list { flex: 1; overflow-y: auto; padding: 10px; min-height: 0; }
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 11px; border-radius: var(--radius);
  cursor: pointer; transition: background .12s;
  width: 100%; text-align: left; border: none; background: none;
  font-family: inherit;
}
.list-item:hover { background: var(--accent); }
.list-item.active { background: var(--accent); }

.item-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--teal); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; font-weight: 600; flex-shrink: 0;
}
.item-avatar svg { width: 16px; height: 16px; }
.item-info { flex: 1; min-width: 0; text-align: left; }
.item-name { font-size: .85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-balance { font-size: .77rem; margin-top: 1px; }
.item-balance.positive { color: var(--teal); }
.item-balance.negative { color: var(--red); }
.item-balance.settled  { color: var(--gray); }

.sidebar-invite {
  border-top: 1px solid var(--border); padding: 12px 16px;
  background: rgba(236,236,240,.3); flex-shrink: 0;
}
.invite-label { font-size: .78rem; color: var(--muted-fg); margin-bottom: 7px; }
.invite-row { display: flex; gap: 7px; }
.invite-input {
  flex: 1; padding: 7px 10px; border: 1px solid var(--border);
  border-radius: var(--radius); font-family: inherit; font-size: .78rem;
  background: var(--card); color: var(--ink); outline: none;
  transition: border-color .15s;
}
.invite-input:focus { border-color: var(--teal); }
.invite-input::placeholder { color: var(--muted-fg); }
.btn-outline {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 11px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--card); cursor: pointer;
  font-family: inherit; font-size: .78rem; font-weight: 500; color: var(--ink);
  transition: background .12s; white-space: nowrap;
}
.btn-outline:hover { background: var(--muted); }
.btn-outline svg { width: 13px; height: 13px; }

/* ══════════════ MAIN DASHBOARD ══════════════ */
.main-dashboard { flex: 1; overflow-y: auto; background: var(--bg); }
.main-inner { max-width: 760px; margin: 0 auto; padding: 24px; }

.welcome-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.welcome-header h1 { font-size: 1.75rem; font-weight: 500; letter-spacing: -0.3px; }
.welcome-header p  { color: var(--muted-fg); margin-top: 3px; font-size: .875rem; }
.profile-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 12px; border-radius: var(--radius);
  background: none; border: none; cursor: pointer; font-family: inherit;
  transition: background .12s;
}
.profile-btn:hover { background: var(--accent); }
.profile-text { text-align: right; }
.profile-name { font-size: .875rem; font-weight: 500; }
.profile-link { font-size: .78rem; color: var(--muted-fg); }
.profile-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--teal); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem; font-weight: 600;
}

.card {
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
  margin-bottom: 18px; overflow: hidden;
}
.card-header {
  padding: 18px 20px 14px;
  display: flex; align-items: center; gap: 9px;
}
.card-icon { color: var(--teal); display: flex; }
.card-icon svg { width: 20px; height: 20px; }
.card-title { font-size: 1.05rem; font-weight: 600; }
.card-body { padding: 0 20px 20px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: .82rem; font-weight: 500; }
.form-input, .form-select {
  padding: 8px 12px; border: 1px solid var(--border);
  border-radius: var(--radius); font-family: inherit;
  font-size: .85rem; color: var(--ink); background: var(--card);
  outline: none; transition: border-color .15s, box-shadow .15s; width: 100%;
}
.form-input:focus, .form-select:focus {
  border-color: var(--teal); box-shadow: 0 0 0 2px rgba(91,197,167,.18);
}
.form-input::placeholder { color: var(--muted-fg); }
.icon-wrap { position: relative; }
.icon-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--muted-fg); pointer-events: none; }
.icon-wrap .form-input { padding-left: 30px; }

.btn-teal-full {
  width: 100%; padding: 11px; background: var(--teal); color: #fff;
  border: none; border-radius: var(--radius); font-family: inherit;
  font-size: .875rem; font-weight: 500; cursor: pointer;
  transition: background .15s, transform .1s;
}
.btn-teal-full:hover { background: var(--teal-dark); }
.btn-teal-full:active { transform: scale(.99); }

.summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
.summary-card {
  text-align: center; padding: 14px 10px;
  background: rgba(236,236,240,.38); border-radius: var(--radius);
}
.summary-label {
  font-size: .78rem; color: var(--muted-fg); margin-bottom: 7px;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.summary-label svg { width: 13px; height: 13px; }
.summary-amount { font-size: 1.45rem; font-weight: 600; letter-spacing: -0.5px; }
.summary-amount.teal { color: var(--teal); }
.summary-amount.red  { color: var(--red); }

/* ══════════════ RIGHT SIDEBAR ══════════════ */
.right-sidebar {
  width: 300px; min-width: 300px;
  background: var(--card);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}
.right-header {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 9px; flex-shrink: 0;
}
.right-header svg { width: 20px; height: 20px; color: var(--teal); }
.right-header h2 { font-size: 1.05rem; font-weight: 600; }

.activity-list { flex: 1; overflow-y: auto; min-height: 0; }
.activity-item {
  padding: 12px 18px; display: flex; align-items: flex-start; gap: 10px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .12s;
}
.activity-item:hover { background: rgba(233,235,239,.5); }
.act-icon {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--muted); display: flex; align-items: center; justify-content: center;
  color: var(--muted-fg); flex-shrink: 0; margin-top: 1px;
}
.act-icon svg { width: 13px; height: 13px; }
.act-body { flex: 1; min-width: 0; }
.act-text { font-size: .8rem; line-height: 1.4; margin-bottom: 5px; }
.act-text strong { font-weight: 600; }
.act-bottom { display: flex; align-items: center; justify-content: space-between; }
.act-amount { font-size: .8rem; font-weight: 600; }
.act-amount.teal { color: var(--teal); }
.act-amount.red  { color: var(--red); }
.act-amount.gray { color: var(--muted-fg); }
.act-time { display: flex; align-items: center; gap: 3px; font-size: .72rem; color: var(--muted-fg); }
.act-time svg { width: 10px; height: 10px; }

.right-footer { border-top: 1px solid var(--border); padding: 12px 18px; flex-shrink: 0; }
.view-all-btn {
  width: 100%; background: none; border: none;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  color: var(--teal); font-family: inherit; font-size: .85rem; font-weight: 500;
  cursor: pointer; padding: 8px; border-radius: var(--radius);
  transition: background .12s, color .12s;
}
.view-all-btn:hover { background: var(--accent); color: var(--teal-dark); }
.view-all-btn svg { width: 15px; height: 15px; }

/* ══════════════ MODALS ══════════════ */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(3,2,19,.42); backdrop-filter: blur(3px);
  z-index: 200; align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--card); border-radius: calc(var(--radius) * 1.8);
  padding: 26px; width: min(460px, 92vw);
  box-shadow: 0 8px 32px rgba(0,0,0,.14);
  animation: fadeUp .18s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-size: 1.1rem; font-weight: 600; }
.modal-close {
  width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  background: var(--muted); border: none; cursor: pointer;
  font-size: .85rem; color: var(--muted-fg); transition: background .12s;
}
.modal-close:hover { background: #d0d0d8; }
.modal-tabs {
  display: flex; gap: 3px; background: var(--muted);
  border-radius: var(--radius); padding: 3px; margin-bottom: 16px;
}
.modal-tab {
  flex: 1; padding: 7px; border: none; background: none;
  border-radius: calc(var(--radius) - 2px); font-family: inherit;
  font-size: .8rem; font-weight: 500; color: var(--muted-fg); cursor: pointer;
  transition: all .15s;
}
.modal-tab.active { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }
.modal-footer { display: flex; gap: 10px; margin-top: 18px; }
.modal-footer .btn-teal-full { flex: 1; }
.btn-cancel {
  flex: 1; padding: 11px; background: none; border: 1px solid var(--border);
  border-radius: var(--radius); font-family: inherit; font-size: .875rem;
  font-weight: 500; cursor: pointer; color: var(--muted-fg); transition: background .12s;
}
.btn-cancel:hover { background: var(--muted); }

/* Settle */
.settle-summary {
  background: var(--bg); border-radius: var(--radius);
  padding: 16px; margin-bottom: 16px; text-align: center;
}
.settle-people { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 10px; }
.settle-person { text-align: center; font-size: .78rem; color: var(--muted-fg); }
.settle-person .p-avatar {
  width: 42px; height: 42px; border-radius: 50%; margin: 0 auto 5px;
  background: var(--teal); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: .88rem;
}
.settle-arrow { color: var(--muted-fg); }
.settle-arrow svg { width: 18px; height: 18px; }
.settle-lbl { font-size: .78rem; color: var(--muted-fg); margin-bottom: 3px; }
.settle-big { font-size: 2rem; font-weight: 700; color: var(--red); }

/* Toast */
.toast-area { position: fixed; bottom: 20px; right: 20px; z-index: 500; display: flex; flex-direction: column; gap: 7px; }
.toast {
  background: var(--ink); color: #fff;
  padding: 10px 15px; border-radius: var(--radius);
  font-size: .82rem; font-weight: 500;
  box-shadow: var(--shadow); animation: toastIn .18s ease;
  max-width: 260px;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(10px); }
  to   { opacity: 1; transform: translateX(0); }
}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

/* ── Param Banner ─────────────────────────────────────── */
#paramBanner {
  display: none;
  align-items: center; justify-content: center;
  gap: 8px;
  padding: 7px 20px;
  font-size: .78rem;
  background: rgba(255,101,47,.08);
  border-bottom: 1px solid rgba(255,101,47,.25);
  color: #a03010;
  font-family: 'Inter', sans-serif;
  flex-shrink: 0;
  position: sticky; top: 0; z-index: 150;
}
#paramBanner code {
  font-family: monospace; font-size: .75rem;
  background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 4px;
}
</style>
</head>

<script>
// ── Data ──────────────────────────────────────────────
function randBal() {
  const r = Math.random();
  if (r < 0.33) return 0;
  const amt = parseFloat((Math.random() * 300 + 5).toFixed(2));
  return r < 0.66 ? amt : -amt;
}
function balType(b) { return b === 0 ? 'settled' : b > 0 ? 'positive' : 'negative'; }
const groupIcons = ['home','plane','utensils','mountain','home','utensils','plane','home','utensils','mountain','home','utensils','plane','mountain','utensils','mountain','home','utensils','plane','mountain'];
let groups = [
  'Apartment 4B','Japan Trip 2026','Household Bills','Bali Getaway','Friday Dinners',
  'Office Snacks','Seoul Weekend','Condo Utilities','Brunch Club','Europe Backpacking',
  'Wedding Fund','Game Night Crew','Bangkok Trip','Gym Membership','Potluck Group',
  'Ski Trip 2026','Streaming Subs','Taco Tuesdays','Road Trip CA','Book Club Expenses'
].map((name, i) => { const b = randBal(); return { id:'g'+i, name, balance: b, type: balType(b), icon: groupIcons[i] }; });
let friends = [
  'Alex Chen','Sarah Kim','Marcus Johnson','Priya Patel','David Wong',
  'Emily Tanaka','James Liu','Mei Lin',"Ryan O'Brien",'Aisha Rahman',
  'Carlos Rivera','Hannah Lee','Tomoko Sato','Daniel Park','Olivia Nguyen',
  'Ben Martinez','Chloe Zhang','Kevin Nakamura','Sophie Tan','Ravi Sharma',
  'Mia Thompson','Jun Watanabe','Natalie Cruz','Tyler Huang','Jasmine Ali',
  'Ethan Choi','Rachel Ong','Michael Santos','Yuki Hayashi','Grace Lim',
  'Arjun Mehta','Lily Fernandez','Noah Takahashi','Zara Hussein','Lucas Pereira',
  'Emma Sullivan','Hiroshi Yamamoto','Fatima Yusuf','Derek Chang','Ava Reyes',
  'Vikram Singh','Isabel Torres','Sean Murphy','Nina Zhao','Chris Andersen'
].map((name, i) => { const b = randBal(); return { id:'f'+i, name, balance: b, type: balType(b) }; });
let transactions = [
  { id:1, from:'Sarah', to:'you', type:'expense',    desc:'Dinner at Restaurant',  amount:28.33, date:'Today',     time:'2:30 PM',  group:null },
  { id:2, from:'you',   to:'Mike',type:'payment',    desc:'Payment',               amount:45.50, date:'Today',     time:'11:15 AM', group:null },
  { id:3, from:'you',   to:'Emily',type:'expense',   desc:'Uber to Airport',       amount:30.00, date:'Yesterday', time:'6:45 PM',  group:null },
  { id:4, from:'Mike',  to:'you', type:'expense',    desc:'Grocery Shopping',      amount:40.17, date:'Yesterday', time:'3:20 PM',  group:null },
  { id:5, from:'Emily', to:'you', type:'settlement', desc:'Settled up',            amount:125.00,date:'Yesterday', time:'10:00 AM', group:null },
  { id:6, from:'you',   to:'Sarah',type:'expense',   desc:'Coffee Shop',           amount:12.50, date:'Feb 1',     time:'9:30 AM',  group:null },
  { id:7, from:'Alex',  to:'you', type:'expense',    desc:'Movie Tickets',         amount:18.75, date:'Feb 1',     time:'7:15 PM',  group:'Trip to Bali' },
  { id:8, from:'you',   to:'Roommates',type:'expense',desc:'Utilities Bill',       amount:85.00, date:'Jan 31',    time:'4:00 PM',  group:'Roommates' },
];

let activeTab = 'groups';
let selectedId = 'g1';
let addTabMode = 'group';

// ── Icon SVGs ─────────────────────────────────────────
const ICONS = {
  home:     `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  plane:    `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21 4 19 4c-2 0-4 1-5.5 2.5L10 10 1.8 6.2a.5.5 0 0 0-.5.1L0 7.5c-.2.2-.1.5.1.7L4 11 4 14l-2 2v2l2-1 2 2h2l-1 2 3.5-1 3.3 3.9a.5.5 0 0 0 .7.1l1.3-1.3a.5.5 0 0 0 .1-.5z"/></svg>`,
  utensils: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>`,
  mountain: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>`,
};

const initials = name => name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

// ── Sidebar list ──────────────────────────────────────
function renderList(q='') {
  const list = activeTab === 'groups' ? groups : friends;
  const filtered = list.filter(i => i.name.toLowerCase().includes(q.toLowerCase()));
  const el = document.getElementById('sidebarList');
  if (!filtered.length) {
    el.innerHTML = `<div style="padding:18px;text-align:center;font-size:.8rem;color:var(--muted-fg)">No results</div>`;
    return;
  }
  el.innerHTML = filtered.map(item => {
    const balText = item.balance === 0 ? 'settled up'
      : (item.type==='positive' ? `you are owed $${item.balance.toFixed(2)}` : `you owe $${Math.abs(item.balance).toFixed(2)}`);
    const avatarContent = (activeTab==='groups' && ICONS[item.icon]) ? ICONS[item.icon] : initials(item.name);
    return `<button class="list-item${selectedId===item.id?' active':''}" onclick="selectItem('${item.id}')">
      <div class="item-avatar">${avatarContent}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-balance ${item.type}">${balText}</div>
      </div>
    </button>`;
  }).join('');
}

function selectItem(id) { selectedId=id; renderList(document.getElementById('searchInput').value); }
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabGroups').classList.toggle('active', tab==='groups');
  document.getElementById('tabFriends').classList.toggle('active', tab==='friends');
  renderList(document.getElementById('searchInput').value);
}
function filterList(q) { renderList(q); }

// ── Activity feed ─────────────────────────────────────
function renderActivity() {
  const el = document.getElementById('activityList');
  el.innerHTML = transactions.map(t => {
    let text, amtCls, amtPfx;
    if (t.type==='settlement') {
      text = `<strong>${t.from}</strong> settled up with you`;
      amtCls='gray'; amtPfx='';
    } else if (t.type==='payment') {
      text = `<strong>${t.from==='you'?'you':t.from}</strong> paid <strong>${t.to}</strong>`;
      amtCls = t.from==='you'?'teal':'red'; amtPfx = t.from==='you'?'+':'-';
    } else {
      const actor = t.from==='you'?'You':t.from;
      text = `<strong>${actor}</strong> added <strong>${t.desc}</strong>${t.group?` in <strong>${t.group}</strong>`:''}`;
      amtCls = t.from==='you'?'teal':'red'; amtPfx = t.from==='you'?'+':'-';
    }
    return `<div class="activity-item">
      <div class="act-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div class="act-body">
        <div class="act-text">${text}</div>
        <div class="act-bottom">
          <div class="act-amount ${amtCls}">${amtPfx}$${t.amount.toFixed(2)}</div>
          <div class="act-time">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${t.date} • ${t.time}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── With-field autocomplete ───────────────────────────
let withSelection = '';
function allWithOptions() {
  return [...groups.map(g=>({name:g.name,type:'group'})), ...friends.map(f=>({name:f.name,type:'friend'}))];
}
function filterWithDropdown(q) {
  const dd = document.getElementById('withDropdown');
  const items = allWithOptions().filter(i => i.name.toLowerCase().includes(q.toLowerCase()));
  if (!items.length || !q) {
    // show all when empty, hide when truly no match
    const all = q ? [] : allWithOptions().slice(0, 30);
    if (!all.length) { dd.style.display='none'; return; }
    dd.innerHTML = all.map(i => `<div class="with-opt" data-name="${i.name}" onmousedown="selectWith('${i.name.replace(/'/g,"\'")}')">
      <span style="font-size:.8rem;color:var(--muted-fg);margin-right:6px">${i.type==='group'?'👥':'👤'}</span>${i.name}
    </div>`).join('');
    dd.style.display='block'; return;
  }
  dd.innerHTML = items.map(i => `<div class="with-opt" data-name="${i.name}" onmousedown="selectWith('${i.name.replace(/'/g,"\'")}')">
    <span style="font-size:.8rem;color:var(--muted-fg);margin-right:6px">${i.type==='group'?'👥':'👤'}</span>${i.name}
  </div>`).join('');
  dd.style.display = 'block';
}
function selectWith(name) {
  withSelection = name;
  document.getElementById('expWithInput').value = name;
  document.getElementById('withDropdown').style.display = 'none';
}
function hideWithDropdown() {
  document.getElementById('withDropdown').style.display = 'none';
  // If typed value doesn't exactly match a known name, keep as freeform
  withSelection = document.getElementById('expWithInput').value.trim();
}

// ── Add expense ───────────────────────────────────────
function addExpense() {
  const desc   = document.getElementById('expDesc').value.trim();
  const amount = parseFloat(document.getElementById('expAmount').value);
  const with_  = document.getElementById('expWithInput').value.trim();
  if (!desc)           { showToast('Please enter a description'); return; }
  if (!amount || amount<=0) { showToast('Please enter a valid amount'); return; }
  if (!with_)          { showToast('Please select a person or group'); return; }

  const timeStr = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  transactions.unshift({ id:Date.now(), from:'you', to:with_, type:'expense', desc, amount, date:'Today', time:timeStr, group:null });

  // Update summary numbers
  const owed = document.getElementById('sumOwed');
  const total = document.getElementById('sumTotal');
  const half = amount / 2;
  owed.textContent = `$${(parseFloat(owed.textContent.replace('$','')) + half).toFixed(2)}`;
  total.textContent = `$${(parseFloat(total.textContent.replace('$','')) - half).toFixed(2)}`;

  renderActivity();
  document.getElementById('expDesc').value = '';
  document.getElementById('expAmount').value = '';
  document.getElementById('expWithInput').value = '';
  withSelection = '';
  showToast(`"${desc}" — $${amount.toFixed(2)} added`);
}

// ── Add Group/Friend modal ────────────────────────────
function openAddModal()  { document.getElementById('addModal').classList.add('open'); switchModalTab('group'); }
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }
function switchModalTab(tab) {
  addTabMode = tab;
  document.getElementById('mTabGroup').classList.toggle('active', tab==='group');
  document.getElementById('mTabFriend').classList.toggle('active', tab==='friend');
  document.getElementById('mGroupForm').style.display  = tab==='group'  ? '' : 'none';
  document.getElementById('mFriendForm').style.display = tab==='friend' ? '' : 'none';
}
function confirmAdd() {
  if (addTabMode==='group') {
    const name = document.getElementById('newGroupName').value.trim();
    if (!name) { showToast('Enter a group name'); return; }
    groups.push({ id:'g'+Date.now(), name, balance:0, type:'settled', icon:'mountain' });
    document.getElementById('newGroupName').value = '';
    showToast(`Group "${name}" created`);
    if (activeTab==='groups') renderList();
  } else {
    const name = document.getElementById('newFriendName').value.trim();
    if (!name) { showToast('Enter a name'); return; }
    friends.push({ id:'f'+Date.now(), name, balance:0, type:'settled' });
    document.getElementById('newFriendName').value = '';
    document.getElementById('newFriendEmail').value = '';
    showToast(`${name} added as a friend`);
    if (activeTab==='friends') renderList();
  }
  closeAddModal();
}

// ── Settle Up modal ───────────────────────────────────
function openSettle()  { document.getElementById('settleModal').classList.add('open'); }
function closeSettle() { document.getElementById('settleModal').classList.remove('open'); }
function updateSettleTarget() {
  const parts = document.getElementById('settleWith').value.split('|');
  document.getElementById('sAvatarEl').textContent  = parts[2];
  document.getElementById('sPersonName').textContent = parts[3];
  document.getElementById('sBigAmt').textContent = `$${parseFloat(parts[1]).toFixed(2)}`;
  document.getElementById('settleAmt').value = parseFloat(parts[1]).toFixed(2);
}
function confirmSettle() {
  const parts = document.getElementById('settleWith').value.split('|');
  const amt = parseFloat(document.getElementById('settleAmt').value);
  if (!amt || amt<=0) { showToast('Enter a valid amount'); return; }
  const timeStr = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  transactions.unshift({ id:Date.now(), from:parts[3].split(' ')[0], to:'you', type:'settlement', desc:'Settled up', amount:amt, date:'Today', time:timeStr, group:null });
  const owe = document.getElementById('sumOwe');
  const total = document.getElementById('sumTotal');
  owe.textContent   = `$${Math.max(0, parseFloat(owe.textContent.replace('$','')) - amt).toFixed(2)}`;
  total.textContent = `$${(parseFloat(total.textContent.replace('$','')) + amt).toFixed(2)}`;
  renderActivity();
  closeSettle();
  showToast(`Payment of $${amt.toFixed(2)} to ${parts[3]} recorded`);
}

// ── Invite ────────────────────────────────────────────
function sendInvite() {
  const email = document.getElementById('inviteEmail').value.trim();
  if (!email || !email.includes('@')) { showToast('Enter a valid email'); return; }
  showToast(`Invite sent to ${email}`);
  document.getElementById('inviteEmail').value = '';
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg) {
  const area = document.getElementById('toastArea');
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  area.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Query Params ──────────────────────────────────────
const _params = new URLSearchParams(window.location.search);
const SESSION = {
  user_id:   _params.get('participant_id')   || '',
  trial_id:  _params.get('trial_id')  || '',
  user_type: _params.get('user_type') || '',
};
const PAGE_LOAD_TS = Date.now();
let FIRST_QUICK_ADD_CLICK_LOGGED = false;

function getSession() { return SESSION; }

window.TRIAL_ID = SESSION.trial_id;
window.USER_ID = SESSION.user_id;
window.USER_TYPE = SESSION.user_type;
window.SYSTEM_TYPE = 'system_A';

function getTargetMeta(event) {
  const target = event && event.target ? event.target : null;
  if (!target) {
    return { target_id: '', target_class: '', target_tag: '' };
  }
  return {
    target_id: target.id || '',
    target_class: target.className || '',
    target_tag: target.tagName ? target.tagName.toLowerCase() : ''
  };
}

// Attach session context to every user action for logging.
function logEvent(action, payload = {}, event = null) {
  var elapsedMs = Date.now() - PAGE_LOAD_TS;
  const entry = {
    timestamp: new Date().toISOString(),
    elapsed_ms: elapsedMs,
    ...SESSION,
    action,
    ...getTargetMeta(event),
    ...payload,
  };
  if (typeof loggingjs !== 'undefined' && loggingjs.logEvent) {
    loggingjs.logEvent(event, action, {
      event_type: entry.event_type || (event && event.type) || 'ui_action',
      ...entry
    });
  } else {
    console.log('[LOG]', JSON.stringify(entry));
  }
  return entry;
}

// Patch interactive functions to emit log events
const _origAddExpense = addExpense;
addExpense = function() {
  const desc   = document.getElementById('expDesc').value.trim();
  const amount = parseFloat(document.getElementById('expAmount').value);
  const with_  = document.getElementById('expWithInput').value.trim();
  if (desc && amount > 0 && with_) {
    logEvent('add_expense', { event_type: 'form_submit', description: desc, amount, with: with_,
      split: document.getElementById('expSplit').value,
      date: document.getElementById('expDate').value });
  }
  _origAddExpense();
};

const _origConfirmSettle = confirmSettle;
confirmSettle = function() {
  const parts = document.getElementById('settleWith').value.split('|');
  const amt   = parseFloat(document.getElementById('settleAmt').value);
  if (amt > 0) logEvent('settle_up', { event_type: 'form_submit', to: parts[3], amount: amt });
  _origConfirmSettle();
};

const _origConfirmAdd = confirmAdd;
confirmAdd = function() {
  const mode = addTabMode;
  const name = mode === 'group'
    ? document.getElementById('newGroupName').value.trim()
    : document.getElementById('newFriendName').value.trim();
  if (name) logEvent('add_' + mode, { event_type: 'form_submit', name });
  _origConfirmAdd();
};

// Log key click milestones; raw click stream is captured by logging.js.
document.addEventListener('click', function(event) {
  var addExpenseClicked = !!(event.target && event.target.closest('.btn-teal-full[onclick="addExpense()"]'));
  if (addExpenseClicked) {
    logEvent('add_expense_button_click', { event_type: 'metric' }, event);
  }

  if (!FIRST_QUICK_ADD_CLICK_LOGGED) {
    var firstQuickAddField = event.target && event.target.closest('#expWithInput, #expDesc, #expAmount, #expDate, #expSplit');
    if (firstQuickAddField) {
      FIRST_QUICK_ADD_CLICK_LOGGED = true;
      logEvent('first_quick_add_field_click', {
        event_type: 'metric',
        quick_add_field_id: firstQuickAddField.id || ''
      }, event);
    }
  }
}, true);

// ── Init ──────────────────────────────────────────────
document.getElementById('expDate').value = new Date().toISOString().split('T')[0];
renderList();
renderActivity();
logEvent('page_load', { event_type: 'lifecycle' });
</script>
