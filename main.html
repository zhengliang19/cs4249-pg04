<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Select a System</title>
<link href="https://fonts.googleapis.com/css?family=Lato:400,700" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Lato', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}
.container {
    text-align: center;
    padding: 40px;
}
h1 {
    font-size: 28px;
    color: #333;
    margin-bottom: 12px;
}
p {
    font-size: 16px;
    color: #777;
    margin-bottom: 40px;
}
.buttons {
    display: flex;
    gap: 40px;
    justify-content: center;
}
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 220px;
    height: 120px;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
}
.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
    text-decoration: none;
    color: #fff;
}
.btn:active {
    transform: translateY(0);
}
.btn-a {
    background: #ff652f;
}
.btn-b {
    background: #5bc5a7;
}
</style>
</head>
<body>
<div class="container">
    <h1>Please select a system to evaluate</h1>
    <p>Click one of the buttons below to begin.</p>
    <div class="buttons">
        <a class="btn btn-a" href="https://zhengliang19.github.io/cs4249-pg04/SystemA.html">System A</a>
        <a class="btn btn-b" href="https://zhengliang19.github.io/cs4249-pg04/SystemB.html">System B</a>
    </div>
</div>
</body>
</html>
